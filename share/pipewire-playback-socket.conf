# Host-side PipeWire configuration for podsock +p (playback-only audio forwarding)
# Drop this file into ~/.config/pipewire/pipewire.conf.d/
#
# This creates a second unix socket (pipewire-0-playback) that podsock can
# forward into containers. Clients connecting through this socket get the
# "restricted" access label, which WirePlumber can use to deny capture access.

context.modules = [
    {
        name = libpipewire-module-protocol-native
        args = {
            sockets = [
                {
                    name = "pipewire-0-playback"
                }
            ]
        }
    }
]
