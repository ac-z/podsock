# Host-side PipeWire configuration for podsock +p (playback-only audio forwarding)
# Drop this file into ~/.config/pipewire/pipewire.conf.d/
#
# This adds a third socket (pipewire-0-playback) to the existing protocol-native
# module and maps it to "restricted" access in the existing access module.
# No additional modules are loaded — the .args override mechanism replaces the
# module arguments of the already-loaded instances.
#
# Per pipewire.conf(5): "array sections are appended to" in drop-in files, so
# using context.modules to reload a module would create a duplicate instance.
# Instead, module.<name>.args overrides the args of the already-loaded module.
#
# See:
#   https://docs.pipewire.org/page_man_pipewire_conf_5.html
#   https://docs.pipewire.org/page_module_protocol_native.html
#   https://docs.pipewire.org/page_module_access.html

module.protocol-native.args = {
    sockets = [
        { name = "pipewire-0" }
        { name = "pipewire-0-manager" }
        { name = "pipewire-0-playback" }
    ]
}

module.access.args = {
    access.socket = {
        pipewire-0 = "default"
        pipewire-0-manager = "unrestricted"
        pipewire-0-playback = "restricted"
    }
}
