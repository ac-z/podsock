# Host-side WirePlumber configuration for podsock +p (playback-only audio forwarding)
# Drop this file into ~/.config/wireplumber/wireplumber.conf.d/
#
# This attaches a PermissionManager to clients labelled "restricted" by
# PipeWire's access module. The PermissionManager grants read/execute/write
# permissions on Audio/Sink (playback) nodes and denies access to Audio/Source
# (capture) nodes.

access.rules = [
    {
        matches = [
            {
                pipewire.access = "restricted"
            }
        ]
        actions = {
            update-props = {
                permission_manager_name = "playback-only"
            }
        }
    }
]

access.permission-managers = [
    {
        name = "playback-only"
        default_permissions = "rx"
        core_permissions = "rwx"
        rules = [
            {
                matches = [
                    {
                        media.class = "Audio/Sink"
                    }
                ]
                permissions = "rwx"
            }
            {
                matches = [
                    {
                        media.class = "Audio/Source"
                    }
                ]
                permissions = "-"
            }
        ]
    }
]
