# Host-side PipeWire configuration for podsock +p (playback-only audio forwarding)
# Drop this file into ~/.config/pipewire/pipewire.conf.d/
#
# This tells PipeWire's access module to label clients connecting through
# pipewire-0-playback as "restricted" instead of "unrestricted".

context.modules = [
    {
        name = libpipewire-module-access
        args = {
            access.socket = {
                pipewire-0 = "default"
                pipewire-0-manager = "unrestricted"
                pipewire-0-playback = "restricted"
            }
        }
    }
]
